<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LetsLink & LetsPrint 产品介绍</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #222633;
      --border: rgba(255, 255, 255, 0.1);
      --text: #f0f2f5;
      --text-muted: #9ca3af;
      --link: #24b8db;
      --print: #3b82f6;
      --success: #42f0a7;
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    .bg-mesh {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 70% 55% at 18% 8%, rgba(36, 184, 219, 0.2) 0%, transparent 58%),
        radial-gradient(ellipse 62% 48% at 82% 16%, rgba(59, 130, 246, 0.18) 0%, transparent 56%),
        radial-gradient(ellipse 55% 45% at 50% 92%, rgba(66, 240, 167, 0.1) 0%, transparent 52%);
    }

    .shell {
      position: relative;
      z-index: 1;
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 24px 80px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 56px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.3px;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--link), var(--print));
      color: #fff;
      box-shadow: 0 10px 28px rgba(36, 184, 219, 0.26);
    }

    .badge {
      font-size: 12px;
      padding: 5px 13px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: #cbd5e1;
      background: rgba(255, 255, 255, 0.04);
      white-space: nowrap;
    }

    .intro {
      text-align: center;
      max-width: 760px;
      margin: 0 auto 38px;
    }

    .intro h1 {
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.1;
      font-weight: 850;
      margin-bottom: 18px;
    }

    .intro p {
      color: var(--text-muted);
      font-size: clamp(16px, 2vw, 19px);
    }

    .products {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
    }

    .product-card {
      display: block;
      width: 100%;
      min-height: 260px;
      padding: 30px;
      text-align: left;
      color: inherit;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(26, 29, 39, 0.9);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
      font: inherit;
    }

    .product-card:hover,
    .product-card:focus-visible {
      transform: translateY(-4px);
      border-color: rgba(125, 211, 252, 0.42);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.28);
      outline: none;
    }

    .product-head {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 22px;
    }

    .product-icon {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 28px;
      font-weight: 900;
    }

    .product-icon.link {
      background: linear-gradient(135deg, #24b8db, #42f0a7);
      color: #06111f;
      box-shadow: 0 12px 32px rgba(36, 184, 219, 0.28);
    }

    .product-icon.print {
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      box-shadow: 0 12px 32px rgba(59, 130, 246, 0.28);
    }

    .product-name {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .product-subtitle {
      color: var(--text-muted);
      font-size: 14px;
    }

    .product-desc {
      color: #cbd5e1;
      font-size: 15px;
      margin-bottom: 24px;
    }

    .product-action {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #7dd3fc;
      font-size: 14px;
      font-weight: 700;
    }

    .viewer {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10;
      background: var(--bg);
    }

    .viewer.active {
      display: block;
    }

    .viewer-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 18px;
      background: rgba(15, 17, 23, 0.94);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      z-index: 2;
    }

    .viewer-title {
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .viewer-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .viewer-button {
      height: 34px;
      padding: 0 14px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .viewer-button:hover,
    .viewer-button:focus-visible {
      border-color: rgba(125, 211, 252, 0.45);
      outline: none;
    }

    .viewer-frame {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      top: 56px;
      width: 100%;
      height: calc(100vh - 56px);
      border: 0;
      background: #0f1117;
    }

    @media (max-width: 760px) {
      .shell {
        padding: 22px 18px 56px;
      }

      .topbar {
        margin-bottom: 42px;
      }

      .products {
        grid-template-columns: 1fr;
      }

      .product-card {
        min-height: auto;
        padding: 24px;
      }

      .viewer-bar {
        padding: 0 12px;
      }

      .viewer-button {
        padding: 0 11px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>

  <main class="shell" id="home">
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">L</div>

    <section class="intro">
      <h1>两个轻量级企业工具</h1>
      <p>先选择你想了解的产品，点击后会切换到对应的完整介绍页面。</p>
    </section>

    <section class="products" aria-label="产品列表">
      <button class="product-card" type="button" data-product="link">
        <div class="product-head">

          <div>

        <span class="product-action">查看 LetsLink 介绍 →</span>

        <span class="product-action">查看 LetsPrint 介绍 →</span>
      </button>
    </section>
  </main>

  <section class="viewer" id="viewer" aria-label="产品详情">
    <div class="viewer-bar">
      <div class="viewer-title" id="viewerTitle"></div>
      <div class="viewer-actions">

      </div>
    </div>
    <iframe class="viewer-frame" id="viewerFrame" title="产品介绍"></iframe>
  </section>

    const viewer = document.getElementById('viewer');
    const frame = document.getElementById('viewerFrame');
    const title = document.getElementById('viewerTitle');
    const switchButton = document.getElementById('switchButton');
    const backButton = document.getElementById('backButton');
    let currentProduct = null;

    document.querySelectorAll('[data-product]').forEach((card) => {
      card.addEventListener('click', () => showProduct(card.dataset.product));
    });

    switchButton.addEventListener('click', () => {
      if (currentProduct) {
        showProduct(products[currentProduct].switchTo);
      }
    });

    backButton.addEventListener('click', () => {
      viewer.classList.remove('active');
      frame.removeAttribute('srcdoc');
      currentProduct = null;
      document.getElementById('home').focus?.();
    });

    function showProduct(key) {
      currentProduct = key;
      const product = products[key];
      const other = products[product.switchTo];
      title.textContent = product.name;
      switchButton.textContent = '切换到 ' + other.name;
      frame.srcdoc = product.html;
      viewer.classList.add('active');
    }

    function decodeHtml(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) {
        bytes[i] = binary.charCodeAt(i);
      }
      return new TextDecoder('utf-8').decode(bytes);
    }
